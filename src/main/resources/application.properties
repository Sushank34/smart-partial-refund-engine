# Server — uses the platform-provided PORT in the cloud, falling back to 8086 locally.
server.port=${PORT:8086}

# In-memory H2 — zero infra. Console at http://localhost:8086/h2-console (jdbc:h2:mem:refunds)
spring.datasource.url=jdbc:h2:mem:refunds;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
